[alembic]
script_location = alembic

#ensures python can import your project files from he root directory when running migrations
prepend_sys_path = .

#where the database goes : alembic reads this to know which database to migrate (does not care about celery or redis)
sqlalchemy.url = postgresql+psycopg2://postgres:admin@db:5432/post_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S